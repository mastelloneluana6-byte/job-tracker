<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" role="img" aria-labelledby="title desc">
  <title id="title">Scope  Job application tracker</title>
  <desc id="desc">Dark banner with gold accent and Scope wordmark</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0e"/>
      <stop offset="50%" style="stop-color:#080809"/>
      <stop offset="100%" style="stop-color:#121214"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d089"/>
      <stop offset="100%" style="stop-color:#9a7b1a"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="300" fill="url(#bg)"/>
  <rect x="0" y="0" width="1100" height="140" fill="url(#glow)"/>
  <rect x="0" y="0" width="1100" height="300" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Logo mark -->
  <rect x="56" y="86" width="88" height="88" rx="18" fill="rgba(201,162,39,0.12)" stroke="rgba(201,162,39,0.45)" stroke-width="1.5"/>
  <text x="100" y="158" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="700" fill="url(#gold)">S</text>
  <!-- Wordmark -->
  <text x="176" y="132" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" letter-spacing="0.35em" fill="#71717a">SCOPE</text>
  <text x="176" y="188" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700" fill="#fafafa">Job application tracker</text>
  <text x="176" y="228" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" fill="#a1a1aa">Next.js · Prisma · PostgreSQL · Neon · Vercel</text>
  <!-- Accent line -->
  <rect x="56" y="258" width="120" height="3" rx="1.5" fill="url(#gold)"/>
</svg>
